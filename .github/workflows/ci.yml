# CI pipeline for the Nextgamenight FRONTEND repo (chrismcclarin/gamecalendarfrontend).
#
# This workflow lives in the FE repo, so the checkout root IS the Next.js app —
# there is NO `periodictabletop/` subdir and NO `working-directory: periodictabletop`.
# The e2e job CROSS-REPO checks out the backend (chrismcclarin/GameCalendarbackendv2),
# whose app lives at `backend/Sonnet/`.
#
# Two jobs (D-01/D-02):
#   quality  — fast gate: lint + tsc --noEmit + born-.tsx git-diff block + vitest run
#   e2e      — slow gate (needs: quality): real backend + Postgres + Playwright journeys
name: CI

on:
  pull_request:
    branches: [main] # the FE repo's default branch (NOT the docs-root `master`)
  push:
    branches-ignore: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git-diff base comparison)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so the born-.tsx git-diff can reach the PR base sha

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (hard tsc gate — not relying on `next build` alone)
        run: npm run typecheck # tsc --noEmit; checkJs:false keeps it sub-second

      - name: Unit tests
        run: npx vitest run

      - name: Born-.tsx enforcement (fail on any NEW app-source .js/.jsx under src/)
        # D-08: a NEW app-source file must be .ts/.tsx. Scoped to ADDED files only
        # (--diff-filter=A) under the FE-repo-relative `src/` tree. Existing .js,
        # config files, and e2e/ are unaffected. Only runs on pull_request (needs a base).
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          NEW_JS=$(git diff --name-only --diff-filter=A "$BASE_SHA"...HEAD \
            | grep -E '^src/.*\.(js|jsx)$' || true)
          if [ -n "$NEW_JS" ]; then
            echo "::error::New app-source .js/.jsx files added under src/ — new files must be .ts/.tsx (TS-01 / D-08):"
            echo "$NEW_JS"
            exit 1
          fi
          echo "No newly-added src/ .js(x) files — born-.tsx enforcement passed."

  e2e:
    name: e2e
    needs: quality # D-02: e2e only runs after the fast quality gate is green
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: boardgame_db
        ports:
          - 5432:5432
        # Health-gate the container so DB steps never race the server coming up.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DB connection — both forms, so create-database.js (DB_* vars) and
      # the sequelize-cli migrate path + runtime (DATABASE_URL) agree on the
      # same Postgres service container.
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: boardgame_db
      DATABASE_URL: postgres://postgres:password@localhost:5432/boardgame_db
      # Backend boot env (minimal — optional integrations degrade gracefully, Pitfall 5).
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      FRONTEND_URL: http://localhost:3000
      # Signs availability magic JWTs + RSVP HMAC links (services/magicTokenService,
      # routes/rsvp.js). Throwaway CI-only value — must merely AGREE between the
      # fixture-minting step and the booted server, so plaintext is fine.
      MAGIC_TOKEN_SECRET: e2e-ci-throwaway-magic-token-secret-1f2e3d4c5b6a

    steps:
      - name: Checkout frontend (gamecalendarfrontend — repo root = FE app)
        uses: actions/checkout@v4

      - name: "Checkout backend (cross-repo: GameCalendarbackendv2)"
        uses: actions/checkout@v4
        with:
          repository: chrismcclarin/GameCalendarbackendv2
          path: backend # BE app then lives at backend/Sonnet/
          # GameCalendarbackendv2 is PUBLIC (verified 2026-05-30) — no token needed;
          # actions/checkout reads public repos with the default GITHUB_TOKEN.

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/Sonnet/package-lock.json

      # ---- Backend: install, provision DB from the models, boot ----
      - name: Backend — install
        working-directory: backend/Sonnet
        run: npm ci

      - name: Backend — create database
        working-directory: backend/Sonnet
        run: npm run db:create

      # NO migrate step: the repo's migrations evolve the pre-existing prod
      # schema and cannot run from an empty DB (the earliest one assumes the
      # "Users" table already exists — proven by CI run 27304799255). Schema
      # comes from the models instead: the seed script runs
      # sequelize.sync({ alter: true }) and server boot syncs again (force:false).
      - name: Backend — seed (sync({alter:true}) builds the schema from models; seed data belongs to the E2E login identity)
        working-directory: backend/Sonnet
        env:
          AUTH0_ALICE_SUB: ${{ secrets.AUTH0_ALICE_SUB }} # the test user's `sub`
        run: npm run seed

      - name: Backend — mint E2E fixtures (journey tokens + ids -> GITHUB_ENV)
        working-directory: backend/Sonnet
        env:
          AUTH0_ALICE_SUB: ${{ secrets.AUTH0_ALICE_SUB }}
        run: |
          # Sequelize logs SQL to stdout — fish out the single marker line.
          # Output goes to a file (NOT the log) so tokens never print (T-82-11).
          node scripts/e2e-fixtures.js > /tmp/e2e-fixtures.out 2>&1 || { tail -40 /tmp/e2e-fixtures.out; exit 1; }
          JSON=$(grep -m1 '^E2E_FIXTURES_JSON=' /tmp/e2e-fixtures.out | sed 's/^E2E_FIXTURES_JSON=//')
          [ -n "$JSON" ] || { echo "::error::e2e-fixtures emitted no marker line"; tail -40 /tmp/e2e-fixtures.out; exit 1; }
          {
            echo "E2E_GROUP_ID=$(echo "$JSON" | jq -r .group_id)"
            echo "E2E_AVAILABILITY_TOKEN=$(echo "$JSON" | jq -r .availability_token)"
            echo "E2E_RSVP_PATH=$(echo "$JSON" | jq -r .rsvp_path)"
          } >> "$GITHUB_ENV"
          echo "Fixtures minted (group id, availability token, rsvp path)."

      - name: Backend — boot (server.js, :4000) and smoke-wait /health
        working-directory: backend/Sonnet
        run: |
          npm start &
          npx --yes wait-on http://localhost:4000/health --timeout 60000

      # ---- Frontend: install, production build + start, then Playwright ----
      - name: Frontend — install
        run: npm ci

      - name: Frontend — production build (proves the green build, SC#1 / Open Q3)
        run: npm run build

      - name: Frontend — start (next start, :3000) and wait
        env:
          # Full @auth0/nextjs-auth0 server env — the Playwright setup project
          # drives the real /api/auth/login route, so the Next server must be
          # able to complete the Auth0 code exchange (T-82-11: secrets cross
          # only via env, never echoed).
          AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }} # cookie-encryption key, CI-only random value
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
        run: |
          npm start &
          npx --yes wait-on http://localhost:3000 --timeout 60000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright journeys (setup logs in once; 4 journeys reuse storageState)
        env:
          # Auth credentials cross into the runner ONLY via env — never echoed (T-82-11).
          E2E_AUTH0_USER: ${{ secrets.E2E_AUTH0_USER }}
          E2E_AUTH0_PASS: ${{ secrets.E2E_AUTH0_PASS }}
        run: npx playwright test

      - name: Upload Playwright failure evidence (excludes .auth/ — T-82-12)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          # The CI reporter is 'github' (no playwright-report/ dir) — failure
          # evidence (screenshots, traces, error-context.md) lands in
          # test-results/. NOT .auth/ — never upload the appSession storageState.
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
